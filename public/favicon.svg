<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CC0000"/>
      <stop offset="100%" style="stop-color:#1B2B6B"/>
    </linearGradient>
  </defs>
  <!-- Fond arrondi -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Lettre C stylisée -->
  <text x="32" y="46" 
    font-family="Arial Black, sans-serif" 
    font-size="42" 
    font-weight="900"
    fill="white" 
    text-anchor="middle"
    letter-spacing="-2">C</text>
  <!-- Petite barre rouge en bas -->
  <rect x="18" y="52" width="28" height="4" rx="2" fill="white" opacity="0.5"/>
</svg>
